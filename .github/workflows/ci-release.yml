name: Test Solr Action Release

on:
  push:
    tags:
      - "v[0-9]"   # Major version tag release (e.g., v1, v2, ..., v9)

jobs:
  # -----------------------------
  # Job 1: Solr Release Test
  # -----------------------------
  solr-release-test:
    name: solr-release-test (Solr ${{ matrix.solr-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - solr-version: "8"
            configset: "tests/solr_configs/8.x.x"
          - solr-version: "9"
            configset: "tests/solr_configs/9.x.x"
          - solr-version: "10"
            configset: "tests/solr_configs/10.x.x"
    env:
      SOLR_CORE_NAME: test_core
    steps:
      # -----------------------------
      # 1. Checkout Repository
      # -----------------------------
      - name: 📥 Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # -----------------------------
      # 2. Setup Apache Solr (Release Action)
      # -----------------------------
      - name: ⚡ Setup Apache Solr Infrastructure (Release)
        uses: dhavalgojiya/setup-solr-action@v1
        with:
          solr-version: ${{ matrix.solr-version }}
          solr-core-name: ${{ env.SOLR_CORE_NAME }}
          solr-custom-configset-path: ${{ matrix.configset }}

      # -----------------------------
      # 3. Verify Solr is Running
      # -----------------------------
      - name: ✅ Verify Solr Health
        run: |
          echo "Pinging Solr Core: ${SOLR_CORE_NAME}"
          RESPONSE=$(curl -s --fail "http://127.0.0.1:8983/solr/${SOLR_CORE_NAME}/admin/ping?wt=json")

          if echo "$RESPONSE" | grep -q '"status":"OK"'; then
            echo "🎉 Solr is healthy and responding"
          else
            echo "❌ Solr ping failed!"
            echo "Response: $RESPONSE"
            exit 1
          fi
