name: Integration Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Cancel in-progress runs for the same ref to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # -----------------------------
  # Job: Test Custom Solr Action
  # -----------------------------
  solr-dev-test:
    name: solr-dev-test (Solr ${{ matrix.solr-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - solr-version: "8"
            configset: "tests/solr_configs/8.x.x"
          - solr-version: "9"
            configset: "tests/solr_configs/9.x.x"
          - solr-version: "10"
            configset: "tests/solr_configs/10.x.x"
    env:
      SOLR_CORE_NAME: test_core
    steps:
      # -----------------------------
      # 1. Checkout Repository
      # -----------------------------
      - name: 📥 Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      # -----------------------------
      # 2. Setup Apache Solr (Local Action)
      # -----------------------------
      - name: ⚡ Setup Apache Solr Infrastructure (Local)
        uses: ./  # Use local action.yml
        with:
          solr-version: ${{ matrix.solr-version }}
          solr-core-name: ${{ env.SOLR_CORE_NAME }}
          solr-custom-configset-path: ${{ matrix.configset }}

      # -----------------------------
      # 3. Verify Solr is Running
      # -----------------------------
      - name: ✅ Verify Solr Health
        run: |
          echo "Pinging Solr Core: ${SOLR_CORE_NAME}"
          RESPONSE=$(curl -s --fail "http://127.0.0.1:8983/solr/${SOLR_CORE_NAME}/admin/ping?wt=json")

          if echo "$RESPONSE" | grep -q '"status":"OK"'; then
            echo "🎉 Solr is healthy and responding"
          else
            echo "❌ Solr ping failed!"
            echo "Response: $RESPONSE"
            exit 1
          fi
